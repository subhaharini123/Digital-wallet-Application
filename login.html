<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaPay - Sign In to Your Digital Wallet</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 90% 80%, rgba(2, 132, 199, 0.04) 0%, transparent 60%),
                #f8fafc;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-xl);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-heading);
            font-weight: 800;
            font-size: 1.75rem;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--secondary);
        }

        .auth-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .auth-alert {
            display: none;
            padding: 12px 16px;
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius-md);
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .auth-btn {
            width: 100%;
            margin-top: 16px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="auth-logo">
                <i data-lucide="wallet" style="stroke-width: 2.5px;"></i>
                NovaPay<span class="logo-dot"></span>
            </a>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Fill in details to access your dashboard</p>
        </div>

        <div class="auth-alert" id="auth-alert-box"></div>

        <form id="login-form" onsubmit="handleLoginSubmit(event)" novalidate>
            <div class="form-group">
                <label for="login-email" class="form-label">Email Address</label>
                <input type="email" id="login-email" class="form-control" placeholder="alex@novapay.co" required>
                <div class="form-feedback" id="val-email">Please enter a valid email.</div>
            </div>
            <div class="form-group" style="position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label for="login-password" class="form-label" style="margin-bottom: 0;">Password</label>
                    <a href="#" style="font-size: 0.8rem; color: var(--primary); font-weight: 500;">Forgot?</a>
                </div>
                <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                <div class="form-feedback" id="val-password">Password is required.</div>
            </div>

            <button type="submit" class="btn btn-primary auth-btn" id="submit-btn">
                Sign In Safely
                <i data-lucide="shield-check" size="18"></i>
            </button>
        </form>

        <div class="auth-footer">
            New to NovaPay? <a href="register.html">Create an Account</a>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        async function handleLoginSubmit(event) {
            event.preventDefault();

            const email = document.getElementById('login-email');
            const password = document.getElementById('login-password');
            const alertBox = document.getElementById('auth-alert-box');
            const submitBtn = document.getElementById('submit-btn');

            // Reset
            alertBox.style.display = 'none';
            alertBox.textContent = '';
            document.querySelectorAll('.form-feedback').forEach(f => f.classList.remove('error'));

            let isValid = true;

            if (!email.value.trim() || !email.value.includes('@')) {
                document.getElementById('val-email').classList.add('error');
                isValid = false;
            }

            if (!password.value.trim()) {
                document.getElementById('val-password').classList.add('error');
                isValid = false;
            }

            if (!isValid) return;

            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Connecting Server...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email.value.trim(),
                        password: password.value
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    submitBtn.innerHTML = 'Authorized! Accessing Portal...';
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 600);
                } else {
                    alertBox.textContent = data.error || 'Autheticate credentials check failed.';
                    alertBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Sign In Safely <i data-lucide="shield-check" size="18"></i>';
                    lucide.createIcons();
                }
            } catch (err) {
                alertBox.textContent = 'Server interface is currently offline. Ensure express server runs.';
                alertBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In Safely <i data-lucide="shield-check" size="18"></i>';
                lucide.createIcons();
            }
        }
    </script>
</body>

</html>
